<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEO Slider Auditor</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <h1>SEO Slider Auditor.Holaa</h1>
        <p>Revisión visual de una URL con checks automáticos, heurísticos y manuales.</p>
      </div>
      <div class="score-card">
        <div class="score-label">Puntuación</div>
        <div id="score" class="score">0</div>
        <div id="scoreText" class="score-text">Pendiente</div>
      </div>
    </header>

    <section class="controls">
      <label for="urlInput">URL a analizar</label>
      <div class="row">
        <input id="urlInput" type="url" placeholder="https://tusitio.com" value="https://example.com">
        <button id="analyzeBtn">Analizar</button>
      </div>
      <div id="status" class="status">Introduce una URL y pulsa Analizar.</div>
    </section>

    <section class="legend">
      <span class="badge ok">Automático</span>
      <span class="badge warn">Heurístico</span>
      <span class="badge manual">Manual</span>
    </section>

    <section id="results" class="results"></section>
  </div>
  <button id="copyReport" style="width: 100%; margin-top: 20px; background: #20316b;">
      Copiar Informe al Portapapeles
  </button>
  <script src="sidepanel.js"></script>
</body>
</html>
